<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>Ôn tập trắc nghiệm - Random câu hỏi</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        font-family: "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
        min-height: 100vh;
        padding: 30px 20px;
        position: relative;
        transition: all 0.3s ease;
      }

      /* Hiệu ứng flash */
      body.flash-correct {
        background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
        transition: 0.1s;
      }

      body.flash-wrong {
        background: linear-gradient(135deg, #fc8181 0%, #e53e3e 100%);
        transition: 0.1s;
      }

      /* Container chính */
      .container {
        max-width: 800px;
        margin: 0 auto;
      }

      /* Header với nút chuyển trang */
      .quiz-header {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 30px;
        padding: 20px 28px;
        margin-bottom: 25px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        position: relative;
      }

      .title h1 {
        font-size: 1.5rem;
        color: #2d3748;
      }

      .title p {
        font-size: 0.8rem;
        color: #718096;
      }

      /* Nút chuyển trang */
      .nav-page-btn {
        background: linear-gradient(135deg, #4299e1, #3182ce);
        color: white;
        border: none;
        padding: 10px 24px;
        border-radius: 50px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
      }

      .nav-page-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(66, 153, 225, 0.4);
      }

      .stats {
        display: flex;
        gap: 20px;
        background: #f7fafc;
        padding: 8px 20px;
        border-radius: 50px;
      }

      .stat {
        text-align: center;
      }

      .stat-label {
        font-size: 0.7rem;
        font-weight: 600;
        color: #4a5568;
      }

      .stat-value {
        font-size: 1.6rem;
        font-weight: 800;
        color: #2c5282;
        line-height: 1;
      }

      /* Nút random mới */
      .random-btn {
        background: linear-gradient(135deg, #ed8936, #dd6b20);
        color: white;
        border: none;
        padding: 8px 20px;
        border-radius: 50px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        font-size: 0.85rem;
      }

      .random-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 5px 15px rgba(221, 107, 32, 0.4);
      }

      /* Thẻ câu hỏi */
      .question-card {
        background: white;
        border-radius: 40px;
        box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35);
        padding: 35px 30px 40px;
        margin-bottom: 25px;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      /* Hiệu ứng rung */
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-8px);
        }
        75% {
          transform: translateX(8px);
        }
      }

      @keyframes bounce {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.02);
        }
      }

      .question-card.correct-animation {
        animation: bounce 0.4s ease;
        background: linear-gradient(white, #f0fff4);
      }

      .question-card.wrong-animation {
        animation: shake 0.4s ease;
        background: linear-gradient(white, #fff5f5);
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        flex-wrap: wrap;
        gap: 12px;
      }

      .question-number {
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        padding: 6px 18px;
        border-radius: 40px;
        font-weight: 600;
        font-size: 0.9rem;
      }

      .skip-btn {
        background: #fff3e0;
        border: none;
        padding: 8px 24px;
        border-radius: 40px;
        font-weight: 600;
        color: #e67e22;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 0.9rem;
      }

      .skip-btn:hover {
        background: #ffe0b3;
        transform: scale(0.97);
      }

      .question-text {
        font-size: 1.5rem;
        font-weight: 600;
        line-height: 1.4;
        color: #1a202c;
        margin: 25px 0 30px;
      }

      .options-list {
        display: flex;
        flex-direction: column;
        gap: 14px;
        margin-bottom: 30px;
      }

      .option {
        background: #f7fafc;
        border: 2px solid #e2e8f0;
        border-radius: 60px;
        padding: 14px 22px;
        display: flex;
        align-items: center;
        gap: 15px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .option:hover {
        background: #edf2f7;
        border-color: #cbd5e0;
        transform: scale(1.01);
      }

      .option.selected {
        background: #c6f6d5;
        border-color: #38a169;
      }

      .option.disabled {
        pointer-events: none;
        opacity: 0.7;
      }

      .option-radio {
        width: 22px;
        height: 22px;
        accent-color: #38a169;
        cursor: pointer;
      }

      .option-text {
        font-size: 1rem;
        font-weight: 500;
        color: #2d3748;
        flex: 1;
      }

      /* Phản hồi */
      .feedback {
        border-radius: 20px;
        padding: 18px 22px;
        margin: 20px 0;
        border-left: 6px solid #3182ce;
        animation: slideIn 0.3s ease;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .feedback.correct {
        background: #f0fff4;
        border-left-color: #38a169;
      }

      .feedback.wrong {
        background: #fff5f5;
        border-left-color: #e53e3e;
      }

      .feedback-title {
        font-weight: 800;
        font-size: 1.1rem;
        margin-bottom: 8px;
      }

      .feedback.correct .feedback-title {
        color: #276749;
      }

      .feedback.wrong .feedback-title {
        color: #c53030;
      }

      .correct-answer-show {
        margin-top: 6px;
        color: #2c5282;
        font-weight: 500;
      }

      /* Nút điều khiển */
      .nav-buttons {
        display: flex;
        justify-content: space-between;
        gap: 15px;
        margin-top: 15px;
      }

      .nav-btn {
        flex: 1;
        background: white;
        border: 2px solid #cbd5e0;
        padding: 14px;
        border-radius: 60px;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.2s;
        color: #4a5568;
      }

      .nav-btn.primary {
        background: linear-gradient(135deg, #667eea, #764ba2);
        border: none;
        color: white;
      }

      .nav-btn.primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
      }

      .nav-btn:hover:not(.primary) {
        background: #edf2f7;
      }

      .submit-btn {
        background: #e53e3e;
        color: white;
        border: none;
        padding: 14px 32px;
        border-radius: 60px;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 10px;
      }

      .submit-btn:hover {
        background: #c53030;
        transform: scale(1.02);
      }

      /* Modal */
      .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(5px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        visibility: hidden;
        opacity: 0;
        transition: 0.2s;
      }

      .modal.show {
        visibility: visible;
        opacity: 1;
      }

      .modal-content {
        background: white;
        max-width: 550px;
        width: 90%;
        border-radius: 48px;
        padding: 35px;
        text-align: center;
        max-height: 80vh;
        overflow-y: auto;
      }

      .score-big {
        font-size: 3.5rem;
        font-weight: 800;
        color: #38a169;
        margin: 15px 0;
      }

      .result-list {
        text-align: left;
        margin: 20px 0;
        max-height: 350px;
        overflow-y: auto;
      }

      .result-item {
        padding: 12px;
        border-bottom: 1px solid #e2e8f0;
      }

      .result-item.correct {
        color: #276749;
      }

      .result-item.wrong {
        color: #c53030;
      }

      @media (max-width: 600px) {
        .question-text {
          font-size: 1.2rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="quiz-header">
        <div class="title">
          <h1>🎲 Ôn tập trắc nghiệm</h1>
          <p>Random câu hỏi • Hiệu ứng sinh động</p>
        </div>
        <div style="display: flex; gap: 12px">
          <button class="random-btn" id="randomBtn">🎲 Random câu</button>
          <button class="nav-page-btn" id="switchPageBtn">
            📄 Trang chính →
          </button>
        </div>
        <div class="stats">
          <div class="stat">
            <div class="stat-label">Đã làm</div>
            <div class="stat-value" id="answeredCount">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">Đúng</div>
            <div class="stat-value" id="correctCount">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">Tổng</div>
            <div class="stat-value" id="totalCount">0</div>
          </div>
        </div>
      </div>

      <div id="currentCard"></div>

      <div style="text-align: center">
        <button class="submit-btn" id="submitBtn">
          📊 Nộp bài & Xem tổng kết
        </button>
      </div>
    </div>

    <div id="resultModal" class="modal">
      <div class="modal-content">
        <h2>🎯 Kết quả ôn tập</h2>
        <div class="score-big" id="finalScore">0/0</div>
        <div id="resultList" class="result-list"></div>
        <button
          class="close-modal"
          id="closeModalBtn"
          style="
            background: #4a5568;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
          "
        >
          Đóng
        </button>
      </div>
    </div>

    <script>
      // Dữ liệu mẫu
      // const SAMPLE_DATA = [
      //   {
      //     id: 1,
      //     question:
      //       "Nguyễn Ái Quốc gởi bản “Yêu sách của nhân dân An Nam” tới Hội nghị Vecxay vào ngày tháng năm nào?",
      //     options: ["18/6/1917", "18/6/1919", "18/6/1918", "18/6/1920"],
      //     answer: "18/6/1919",
      //   },
      //   {
      //     id: 2,
      //     question:
      //       "Nguyễn Ái Quốc đọc “Sơ thảo lần thứ nhất Luận cương về vấn đề dân tộc và vấn đề thuộc địa” của V.I.Lênin vào thời gian nào?",
      //     options: ["7/1917", "7/1920", "7/1918", "7/1922"],
      //     answer: "7/1920",
      //   },
      //   {
      //     id: 3,
      //     question:
      //       "Trong thời gian ở nước ngoài, Nguyễn Tất Thành đã làm những công việc gì?",
      //     options: [
      //       "Phụ bếp, cào tuyết",
      //       "Thợ ảnh, làm bánh",
      //       "Đốt lò, bán báo",
      //       "Tất cả các công việc trên",
      //     ],
      //     answer: "Tất cả các công việc trên",
      //   },
      //   {
      //     number: 151,
      //     question:
      //       "Theo Hồ Chí Minh, ưu điểm lớn nhất của chủ nghĩa tam dân của Tôn Trung Sơn đối với nước ta là:",
      //     options: [
      //       "a. Chống phong kiến",
      //       "b. Đấu tranh vì tự do, dân chủ",
      //       "c. Phù hợp với điều kiện thực tế nước ta",
      //       "d. Đem lại độc lập, tự do",
      //     ],
      //     answer: "c",
      //   },
      //   {
      //     number: 152,
      //     question:
      //       "Tư tưởng Hồ Chí Minh được hình thành từ những tiền đề tư tưởng – lý luận nào?",
      //     options: [
      //       "a. Chủ nghĩa Mác – Lênin",
      //       "b. Những giá trị truyền thống tốt đẹp của dân tộc",
      //       "c. Tinh hoa văn hóa nhân loại",
      //       "d. Tất cả a, b, c",
      //     ],
      //     answer: "d",
      //   },
      // ];

      let questions = [];
      let userAnswers = [];
      let answerStatus = [];
      let skipped = [];
      let currentQuestionId = null; // Lưu ID câu hiện tại (dạng số thứ tự hiển thị)
      let currentIndexInList = 0;
      let quizLocked = false;
      let questionOrder = []; // Mảng lưu thứ tự các câu hỏi đã random

      function normalizeQuestions(raw) {
        return raw.map((item, idx) => ({
          id:
            item.id !== undefined
              ? item.id
              : item.number !== undefined
                ? item.number
                : idx + 1,
          question: item.question,
          options: [...item.options],
          answer: String(item.answer).trim(),
          originalIndex: idx,
        }));
      }

      async function loadQuestions() {
        try {
          const response = await fetch("./cauhoi.json");
          if (response.ok) {
            const data = await response.json();
            if (Array.isArray(data) && data.length) {
              questions = normalizeQuestions(data);
              return;
            }
          }
        } catch (e) {
          console.log("Dùng dữ liệu mẫu");
        }
        questions = normalizeQuestions(SAMPLE_DATA);
      }

      // Random thứ tự câu hỏi
      function randomizeOrder() {
        questionOrder = [...Array(questions.length).keys()];
        for (let i = questionOrder.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [questionOrder[i], questionOrder[j]] = [
            questionOrder[j],
            questionOrder[i],
          ];
        }
      }

      function initState() {
        randomizeOrder();
        userAnswers = new Array(questions.length).fill(null);
        answerStatus = new Array(questions.length).fill(null);
        skipped = new Array(questions.length).fill(false);
        currentIndexInList = 0;
        updateCurrentQuestionId();
        quizLocked = false;
        updateStats();
      }

      function updateCurrentQuestionId() {
        if (currentIndexInList < questionOrder.length) {
          const originalIdx = questionOrder[currentIndexInList];
          currentQuestionId = questions[originalIdx].id;
        }
      }

      function getCurrentOriginalIndex() {
        return questionOrder[currentIndexInList];
      }

      function updateStats() {
        const answered = userAnswers.filter(
          (a) => a !== null && a !== "",
        ).length;
        const correct = answerStatus.filter((s) => s === true).length;
        document.getElementById("answeredCount").innerText = answered;
        document.getElementById("correctCount").innerText = correct;
        document.getElementById("totalCount").innerText = questions.length;
      }

      // Hiệu ứng đặc biệt
      function playEffect(isCorrect) {
        const card = document.querySelector(".question-card");
        const body = document.body;

        if (isCorrect) {
          // Hiệu ứng đúng: bounce + flash xanh
          if (card) card.classList.add("correct-animation");
          body.classList.add("flash-correct");
          setTimeout(() => {
            if (card) card.classList.remove("correct-animation");
            body.classList.remove("flash-correct");
          }, 400);

          // Tạo confetti nhẹ
          for (let i = 0; i < 30; i++) {
            createFloatingElement("🎉", i);
          }
        } else {
          // Hiệu ứng sai: rung + flash đỏ
          if (card) card.classList.add("wrong-animation");
          body.classList.add("flash-wrong");
          setTimeout(() => {
            if (card) card.classList.remove("wrong-animation");
            body.classList.remove("flash-wrong");
          }, 400);

          // Tạo vài biểu tượng buồn
          for (let i = 0; i < 15; i++) {
            createFloatingElement("😢", i);
          }
        }
      }

      function createFloatingElement(emoji, index) {
        const el = document.createElement("div");
        el.innerText = emoji;
        el.style.position = "fixed";
        el.style.left = Math.random() * window.innerWidth + "px";
        el.style.top = window.innerHeight - 100 + "px";
        el.style.fontSize = 20 + Math.random() * 20 + "px";
        el.style.pointerEvents = "none";
        el.style.zIndex = "9999";
        el.style.opacity = "1";
        el.style.transition = "all 1s ease";
        document.body.appendChild(el);

        setTimeout(() => {
          el.style.transform = `translateY(-${200 + Math.random() * 200}px)`;
          el.style.opacity = "0";
        }, 10);

        setTimeout(() => {
          el.remove();
        }, 1000);
      }

      function selectAnswer(selectedValue) {
        if (quizLocked) return;

        const originalIdx = getCurrentOriginalIndex();
        const currentQ = questions[originalIdx];
        const isCorrect = selectedValue.trim() === currentQ.answer;

        userAnswers[originalIdx] = selectedValue;
        answerStatus[originalIdx] = isCorrect;
        skipped[originalIdx] = false;

        // Phát hiệu ứng
        playEffect(isCorrect);

        renderCurrentCardWithFeedback(
          selectedValue,
          isCorrect,
          currentQ.answer,
        );
        quizLocked = true;
        updateStats();
      }

      function skipQuestion() {
        if (quizLocked) return;
        const originalIdx = getCurrentOriginalIndex();
        skipped[originalIdx] = true;
        userAnswers[originalIdx] = null;
        answerStatus[originalIdx] = null;
        updateStats();
        goToNextQuestion();
      }

      function renderCurrentCardWithFeedback(
        selectedValue,
        isCorrect,
        correctAnswer,
      ) {
        const originalIdx = getCurrentOriginalIndex();
        const q = questions[originalIdx];
        const container = document.getElementById("currentCard");

        let optionsHtml = "";
        q.options.forEach((opt) => {
          const isSelected = opt === selectedValue;
          optionsHtml += `<div class="option ${isSelected ? "selected" : ""} disabled"><div class="option-text">${escapeHtml(opt)}</div></div>`;
        });

        const feedbackClass = isCorrect ? "correct" : "wrong";
        const feedbackTitle = isCorrect
          ? "🎉 Chính xác! Tuyệt vời!"
          : "😞 Tiếc quá! Sai rồi!";
        const extraHtml = !isCorrect
          ? `<div class="correct-answer-show">📖 Đáp án đúng: ${escapeHtml(correctAnswer)}</div>`
          : "";

        const html = `
            <div class="question-card">
                <div class="card-header">
                    <span class="question-number">Câu ${q.id}</span>
                    <button class="skip-btn" disabled style="opacity:0.5;">⏭️ Đã chọn</button>
                </div>
                <div class="question-text">${escapeHtml(q.question)}</div>
                <div class="options-list">${optionsHtml}</div>
                <div class="feedback ${feedbackClass}">
                    <div class="feedback-title">${feedbackTitle}</div>
                    ${extraHtml}
                </div>
                <div class="nav-buttons">
                    <button class="nav-btn" id="prevBtn">◀ Câu trước</button>
                    <button class="nav-btn primary" id="nextBtn">Câu tiếp theo ▶</button>
                </div>
            </div>
        `;
        container.innerHTML = html;
        attachNavEvents();
      }

      function renderCurrentCard() {
        const originalIdx = getCurrentOriginalIndex();
        const q = questions[originalIdx];
        const container = document.getElementById("currentCard");

        let optionsHtml = "";
        q.options.forEach((opt, idx) => {
          optionsHtml += `
                <div class="option" data-value="${escapeHtml(opt)}">
                    <input type="radio" name="question" id="opt_${idx}" value="${escapeHtml(opt)}" class="option-radio">
                    <label for="opt_${idx}" class="option-text">${escapeHtml(opt)}</label>
                </div>
            `;
        });

        const html = `
            <div class="question-card">
                <div class="card-header">
                    <span class="question-number">Câu ${q.id}</span>
                    <button class="skip-btn" id="skipBtn">⏭️ Bỏ qua câu này</button>
                </div>
                <div class="question-text">${escapeHtml(q.question)}</div>
                <div class="options-list" id="optionsList">${optionsHtml}</div>
                <div class="nav-buttons">
                    <button class="nav-btn" id="prevBtn">◀ Câu trước</button>
                    <button class="nav-btn primary" id="nextBtn">Câu tiếp theo ▶</button>
                </div>
            </div>
        `;
        container.innerHTML = html;

        const optionDivs = document.querySelectorAll(".option");
        optionDivs.forEach((div) => {
          div.addEventListener("click", (e) => {
            const radio = div.querySelector(".option-radio");
            if (radio && !quizLocked) {
              radio.checked = true;
              selectAnswer(radio.value);
            }
          });
        });

        const radios = document.querySelectorAll(".option-radio");
        radios.forEach((radio) => {
          radio.addEventListener("change", (e) => {
            if (!quizLocked) selectAnswer(e.target.value);
          });
        });

        const skipBtn = document.getElementById("skipBtn");
        if (skipBtn) skipBtn.addEventListener("click", () => skipQuestion());

        attachNavEvents();
      }

      function renderSkippedCard() {
        const originalIdx = getCurrentOriginalIndex();
        const q = questions[originalIdx];
        const container = document.getElementById("currentCard");
        const html = `
            <div class="question-card">
                <div class="card-header">
                    <span class="question-number">Câu ${q.id}</span>
                    <button class="skip-btn" id="unskipBtn" style="background:#e53e3e; color:white;">↺ Hủy bỏ qua</button>
                </div>
                <div class="question-text">${escapeHtml(q.question)}</div>
                <div class="feedback wrong">
                    <div class="feedback-title">⏩ Bạn đã bỏ qua câu này</div>
                    <div class="correct-answer-show">Nhấn "Hủy bỏ qua" để trả lời lại</div>
                </div>
                <div class="nav-buttons">
                    <button class="nav-btn" id="prevBtn">◀ Câu trước</button>
                    <button class="nav-btn primary" id="nextBtn">Câu tiếp theo ▶</button>
                </div>
            </div>
        `;
        container.innerHTML = html;

        const unskipBtn = document.getElementById("unskipBtn");
        if (unskipBtn) {
          unskipBtn.addEventListener("click", () => {
            const origIdx = getCurrentOriginalIndex();
            skipped[origIdx] = false;
            userAnswers[origIdx] = null;
            answerStatus[origIdx] = null;
            quizLocked = false;
            renderCurrentCard();
            updateStats();
          });
        }
        attachNavEvents();
      }

      function goToPrevQuestion() {
        if (currentIndexInList > 0) {
          currentIndexInList--;
          updateCurrentQuestionId();
          quizLocked = false;
          const origIdx = getCurrentOriginalIndex();
          if (userAnswers[origIdx] !== null || skipped[origIdx]) {
            if (skipped[origIdx]) renderSkippedCard();
            else if (
              userAnswers[origIdx] !== null &&
              answerStatus[origIdx] !== null
            ) {
              const q = questions[origIdx];
              renderCurrentCardWithFeedback(
                userAnswers[origIdx],
                answerStatus[origIdx],
                q.answer,
              );
              quizLocked = true;
            }
          } else {
            renderCurrentCard();
          }
        }
      }

      function goToNextQuestion() {
        if (currentIndexInList < questionOrder.length - 1) {
          currentIndexInList++;
          updateCurrentQuestionId();
          quizLocked = false;
          const origIdx = getCurrentOriginalIndex();
          if (userAnswers[origIdx] !== null || skipped[origIdx]) {
            if (skipped[origIdx]) renderSkippedCard();
            else if (
              userAnswers[origIdx] !== null &&
              answerStatus[origIdx] !== null
            ) {
              const q = questions[origIdx];
              renderCurrentCardWithFeedback(
                userAnswers[origIdx],
                answerStatus[origIdx],
                q.answer,
              );
              quizLocked = true;
            }
          } else {
            renderCurrentCard();
          }
        } else {
          alert("📌 Bạn đã xem hết các câu! Nhấn 'Nộp bài' để xem tổng kết.");
        }
      }

      function randomQuestion() {
        if (questions.length === 0) return;
        const newIndex = Math.floor(Math.random() * questionOrder.length);
        currentIndexInList = newIndex;
        updateCurrentQuestionId();
        quizLocked = false;
        const origIdx = getCurrentOriginalIndex();
        if (userAnswers[origIdx] !== null || skipped[origIdx]) {
          if (skipped[origIdx]) renderSkippedCard();
          else if (
            userAnswers[origIdx] !== null &&
            answerStatus[origIdx] !== null
          ) {
            const q = questions[origIdx];
            renderCurrentCardWithFeedback(
              userAnswers[origIdx],
              answerStatus[origIdx],
              q.answer,
            );
            quizLocked = true;
          }
        } else {
          renderCurrentCard();
        }
      }

      function attachNavEvents() {
        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");
        if (prevBtn) prevBtn.addEventListener("click", goToPrevQuestion);
        if (nextBtn) nextBtn.addEventListener("click", goToNextQuestion);
      }

      function showFinalResult() {
        let correctCount = 0;
        let resultHtml = "";
        for (let i = 0; i < questions.length; i++) {
          const q = questions[i];
          const isSkipped = skipped[i];
          const userAns = userAnswers[i];
          const isCorrect = answerStatus[i];
          let statusText = "",
            statusClass = "";
          if (isSkipped) {
            statusText = "⏩ Bỏ qua";
            statusClass = "wrong";
          } else if (userAns === null) {
            statusText = "❌ Chưa trả lời";
            statusClass = "wrong";
          } else if (isCorrect === true) {
            statusText = "✅ Đúng";
            statusClass = "correct";
            correctCount++;
          } else {
            statusText = `❌ Sai (Đáp án: ${escapeHtml(q.answer)})`;
            statusClass = "wrong";
          }
          resultHtml += `<div class="result-item ${statusClass}"><strong>Câu ${q.id}</strong>: ${statusText}<br><span style="font-size:0.8rem;">${escapeHtml(q.question.substring(0, 80))}...</span></div>`;
        }
        document.getElementById("finalScore").innerHTML =
          `${correctCount} / ${questions.length}`;
        document.getElementById("resultList").innerHTML = resultHtml;
        document.getElementById("resultModal").classList.add("show");
      }

      function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function (m) {
          if (m === "&") return "&amp;";
          if (m === "<") return "&lt;";
          if (m === ">") return "&gt;";
          return m;
        });
      }

      async function init() {
        await loadQuestions();
        initState();
        renderCurrentCard();
        document
          .getElementById("randomBtn")
          .addEventListener("click", randomQuestion);
        document
          .getElementById("switchPageBtn")
          .addEventListener("click", () => {
            window.location.href = "./main.html";
          });
        document
          .getElementById("submitBtn")
          .addEventListener("click", showFinalResult);
        document
          .getElementById("closeModalBtn")
          .addEventListener("click", () => {
            document.getElementById("resultModal").classList.remove("show");
          });
        const modal = document.getElementById("resultModal");
        modal.addEventListener("click", (e) => {
          if (e.target === modal) modal.classList.remove("show");
        });
      }

      init();
    </script>
  </body>
</html>
